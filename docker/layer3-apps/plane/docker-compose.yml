services:
  plane-web:
    image: artifacts.plane.so/makeplane/plane-frontend:${PLANE_VERSION}
    container_name: plane-web
    restart: unless-stopped
    depends_on:
      - plane-api
      - plane-worker
    networks:
      plane-tier:
        aliases:
          - web

  plane-space:
    image: artifacts.plane.so/makeplane/plane-space:${PLANE_VERSION}
    container_name: plane-space
    restart: unless-stopped
    depends_on:
      - plane-api
      - plane-worker
      - plane-web
    networks:
      plane-tier:
        aliases:
          - space
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

  plane-admin:
    image: artifacts.plane.so/makeplane/plane-admin:${PLANE_VERSION}
    container_name: plane-admin
    restart: unless-stopped
    depends_on:
      - plane-api
      - plane-web
    networks:
      plane-tier:
        aliases:
          - admin

  plane-live:
    image: artifacts.plane.so/makeplane/plane-live:${PLANE_VERSION}
    container_name: plane-live
    restart: unless-stopped
    environment:
      API_BASE_URL: ${PLANE_API_BASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
    depends_on:
      - plane-api
      - plane-web
    networks:
      plane-tier:
        aliases:
          - live
      data-tier:

  plane-api:
    image: artifacts.plane.so/makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-api
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    volumes:
      - ${PRIMARY_STORAGE_ROOT}/plane/logs/api:/code/plane/logs
    environment:
      WEB_URL: ${PLANE_WEB_URL}
      CORS_ALLOWED_ORIGINS: ${PLANE_CORS_ALLOWED_ORIGINS}
      DATABASE_URL: ${PLANE_DATABASE_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      AMQP_URL: ${PLANE_AMQP_URL}
      API_KEY_RATE_LIMIT: ${PLANE_API_KEY_RATE_LIMIT}
      FILE_SIZE_LIMIT: ${PLANE_FILE_SIZE_LIMIT}
      DEBUG: "0"
      GUNICORN_WORKERS: "1"
      USE_MINIO: "1"
      MINIO_ENDPOINT_SSL: "1"
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
      PGHOST: postgres
      PGDATABASE: ${PLANE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AWS_REGION: ${PLANE_AWS_REGION}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:${MINIO_API_PORT}
      AWS_S3_BUCKET_NAME: ${PLANE_AWS_BUCKET_NAME}
      APP_DOMAIN: ${CF_PLANE_HOST}
      SITE_ADDRESS: :80
      API_BASE_URL: ${PLANE_API_BASE_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    networks:
      plane-tier:
        aliases:
          - api
      data-tier:

  plane-worker:
    image: artifacts.plane.so/makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    volumes:
      - ${PRIMARY_STORAGE_ROOT}/plane/logs/worker:/code/plane/logs
    environment:
      WEB_URL: ${PLANE_WEB_URL}
      CORS_ALLOWED_ORIGINS: ${PLANE_CORS_ALLOWED_ORIGINS}
      DATABASE_URL: ${PLANE_DATABASE_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      AMQP_URL: ${PLANE_AMQP_URL}
      API_KEY_RATE_LIMIT: ${PLANE_API_KEY_RATE_LIMIT}
      FILE_SIZE_LIMIT: ${PLANE_FILE_SIZE_LIMIT}
      DEBUG: "0"
      GUNICORN_WORKERS: "1"
      USE_MINIO: "1"
      MINIO_ENDPOINT_SSL: "1"
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
      PGHOST: postgres
      PGDATABASE: ${PLANE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AWS_REGION: ${PLANE_AWS_REGION}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:${MINIO_API_PORT}
      AWS_S3_BUCKET_NAME: ${PLANE_AWS_BUCKET_NAME}
      APP_DOMAIN: ${CF_PLANE_HOST}
      SITE_ADDRESS: :80
      API_BASE_URL: ${PLANE_API_BASE_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    depends_on:
      - plane-api
    networks:
      - plane-tier
      - data-tier

  plane-beat-worker:
    image: artifacts.plane.so/makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-beat-worker
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    volumes:
      - ${PRIMARY_STORAGE_ROOT}/plane/logs/beat:/code/plane/logs
    environment:
      WEB_URL: ${PLANE_WEB_URL}
      CORS_ALLOWED_ORIGINS: ${PLANE_CORS_ALLOWED_ORIGINS}
      DATABASE_URL: ${PLANE_DATABASE_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      AMQP_URL: ${PLANE_AMQP_URL}
      API_KEY_RATE_LIMIT: ${PLANE_API_KEY_RATE_LIMIT}
      FILE_SIZE_LIMIT: ${PLANE_FILE_SIZE_LIMIT}
      DEBUG: "0"
      GUNICORN_WORKERS: "1"
      USE_MINIO: "1"
      MINIO_ENDPOINT_SSL: "1"
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
      PGHOST: postgres
      PGDATABASE: ${PLANE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AWS_REGION: ${PLANE_AWS_REGION}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:${MINIO_API_PORT}
      AWS_S3_BUCKET_NAME: ${PLANE_AWS_BUCKET_NAME}
      APP_DOMAIN: ${CF_PLANE_HOST}
      SITE_ADDRESS: :80
      API_BASE_URL: ${PLANE_API_BASE_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    depends_on:
      - plane-api
    networks:
      - plane-tier
      - data-tier

  plane-migrator:
    image: artifacts.plane.so/makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    restart: on-failure
    volumes:
      - ${PRIMARY_STORAGE_ROOT}/plane/logs/migrator:/code/plane/logs
    environment:
      WEB_URL: ${PLANE_WEB_URL}
      CORS_ALLOWED_ORIGINS: ${PLANE_CORS_ALLOWED_ORIGINS}
      DATABASE_URL: ${PLANE_DATABASE_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      AMQP_URL: ${PLANE_AMQP_URL}
      API_KEY_RATE_LIMIT: ${PLANE_API_KEY_RATE_LIMIT}
      FILE_SIZE_LIMIT: ${PLANE_FILE_SIZE_LIMIT}
      DEBUG: "0"
      GUNICORN_WORKERS: "1"
      USE_MINIO: "1"
      MINIO_ENDPOINT_SSL: "1"
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
      PGHOST: postgres
      PGDATABASE: ${PLANE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AWS_REGION: ${PLANE_AWS_REGION}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:${MINIO_API_PORT}
      AWS_S3_BUCKET_NAME: ${PLANE_AWS_BUCKET_NAME}
      APP_DOMAIN: ${CF_PLANE_HOST}
      SITE_ADDRESS: :80
      API_BASE_URL: ${PLANE_API_BASE_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    networks:
      - plane-tier
      - data-tier

  plane-proxy:
    image: artifacts.plane.so/makeplane/plane-proxy:${PLANE_VERSION}
    container_name: plane-proxy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${CF_PLANE_HOST}
      FILE_SIZE_LIMIT: ${PLANE_FILE_SIZE_LIMIT}
      LISTEN_HTTP_PORT: 80
      LISTEN_HTTPS_PORT: 443
      BUCKET_NAME: ${PLANE_AWS_BUCKET_NAME}
      SITE_ADDRESS: :80
    depends_on:
      - plane-web
      - plane-api
      - plane-space
      - plane-admin
      - plane-live
    networks:
      - proxy-tier
      - plane-tier
      - data-tier
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  proxy-tier:
    external: true
  data-tier:
    external: true
  plane-tier:
    driver: bridge
