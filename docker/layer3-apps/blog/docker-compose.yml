services:
  astro-blog:
    image: ${CF_HARBOR_HOST:?CF_HARBOR_HOST must be set}/girinman/astro-blog:${BLOG_IMAGE_TAG:?BLOG_IMAGE_TAG must be set (use git sha from github.com/GirinMan/girinman-career)}
    container_name: astro-blog
    restart: unless-stopped
    networks:
      - proxy-tier
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy-tier:
    external: true
