services:
  ghost:
    build: .
    container_name: ghost-blog
    restart: unless-stopped
    environment:
      url: https://${CF_BLOG_HOST}
      server__port: ${GHOST_PORT}
      database__client: postgres
      database__connection__host: postgres
      database__connection__user: ${POSTGRES_USER}
      database__connection__password: ${POSTGRES_PASSWORD}
      database__connection__database: ghost_blog
    volumes:
      - ./content:/var/lib/ghost/content
    networks:
      - proxy-tier
      - data-tier
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:${GHOST_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  proxy-tier:
    external: true
  data-tier:
    external: true
