services:
  # ─── 벡터 타일 서버 (PostGIS → 동적 MVT) ───
  pg-tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: pg-tileserv
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${GIS_DB_NAME}"
    networks:
      - data-tier
      - proxy-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7800'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ─── Feature 서버 (PostGIS → OGC API Features) ───
  pg-featureserv:
    image: pramsey/pg_featureserv:latest
    container_name: pg-featureserv
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${GIS_DB_NAME}"
    networks:
      - data-tier
      - proxy-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ─── 백엔드 API (FastAPI + PostGIS + Redis + ES) ───
  # Image built in github.com/GirinMan/GIS-underground-facilities
  gis-api:
    image: ${CF_HARBOR_HOST:?CF_HARBOR_HOST must be set}/girinman/gis-api:${GIS_API_IMAGE_TAG:?GIS_API_IMAGE_TAG must be set}
    container_name: gis-api
    environment:
      GIS_DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${GIS_DB_NAME}"
      GIS_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      GIS_ELASTICSEARCH_URL: "http://elasticsearch:9200"
      GIS_ELASTICSEARCH_PASSWORD: "${ELASTIC_PASSWORD}"
      GIS_JWT_SECRET: "${GIS_JWT_SECRET}"
      GIS_MINIO_ENDPOINT: "${GIS_MINIO_ENDPOINT}"
      GIS_MINIO_ACCESS_KEY: "${GIS_MINIO_ACCESS_KEY}"
      GIS_MINIO_SECRET_KEY: "${GIS_MINIO_SECRET_KEY}"
      GIS_MINIO_BUCKET: "${GIS_MINIO_BUCKET}"
      GIS_KAFKA_BOOTSTRAP: "${GIS_KAFKA_BOOTSTRAP}"
      GIS_CORS_ORIGINS: '["https://${CF_GIS_HOST}", "http://localhost:5173"]'
      GIS_VWORLD_API_KEY: "${VWORLD_API_KEY}"
    networks:
      - data-tier
      - proxy-tier
    depends_on:
      pg-tileserv:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─── 데이터 수집 워커 (Kafka consumer + shp2pgsql/ogr2ogr) ───
  gis-worker:
    image: ${CF_HARBOR_HOST:?CF_HARBOR_HOST must be set}/girinman/gis-worker:${GIS_WORKER_IMAGE_TAG:?GIS_WORKER_IMAGE_TAG must be set}
    container_name: gis-worker
    environment:
      GIS_DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${GIS_DB_NAME}"
      GIS_MINIO_ENDPOINT: "${GIS_MINIO_ENDPOINT}"
      GIS_MINIO_ACCESS_KEY: "${GIS_MINIO_ACCESS_KEY}"
      GIS_MINIO_SECRET_KEY: "${GIS_MINIO_SECRET_KEY}"
      GIS_MINIO_BUCKET: "${GIS_MINIO_BUCKET}"
      GIS_KAFKA_BOOTSTRAP: "${GIS_KAFKA_BOOTSTRAP}"
    volumes:
      - /tmp/gis-worker:/tmp/gis-worker
    networks:
      - data-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*worker.main' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── 프론트엔드 SPA (React + MapLibre GL JS) ───
  # nginx-spa.conf is baked into the image (gis-web repo).
  gis-web:
    image: ${CF_HARBOR_HOST:?CF_HARBOR_HOST must be set}/girinman/gis-web:${GIS_WEB_IMAGE_TAG:?GIS_WEB_IMAGE_TAG must be set}
    container_name: gis-web
    volumes:
      - tile-cache:/var/cache/nginx/tiles
    networks:
      - proxy-tier
    depends_on:
      gis-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  tile-cache:

networks:
  proxy-tier:
    external: true
  data-tier:
    external: true
