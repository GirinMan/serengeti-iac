# Vector tile cache
proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tile_cache:10m max_size=1g inactive=1h use_temp_path=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver (for dynamic upstream resolution)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # API reverse proxy
    location /api/ {
        set $api_upstream gis-api;
        proxy_pass http://$api_upstream:8000$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500m;
    }

    # Tile server reverse proxy (with caching)
    location /tiles/ {
        set $tile_upstream pg-tileserv;
        rewrite ^/tiles/(.*) /$1 break;
        proxy_pass http://$tile_upstream:7800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # MVT tile caching
        proxy_cache tile_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 204 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Feature server reverse proxy
    location /features/ {
        set $feat_upstream pg-featureserv;
        rewrite ^/features/(.*) /$1 break;
        proxy_pass http://$feat_upstream:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching (Vite hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.mapbox-vector-tile application/x-protobuf;
    gzip_min_length 256;
}
