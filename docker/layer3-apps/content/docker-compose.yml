services:
  directus:
    image: directus/directus:${DIRECTUS_VERSION}
    container_name: content-api
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}
      PORT: ${DIRECTUS_PORT}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DIRECTUS_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: redis
      REDIS: redis://:${REDIS_PASSWORD}@redis:6379
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /directus/uploads
      EXTENSIONS_PATH: /directus/extensions
    volumes:
      - ./extensions:/directus/extensions
      - ${ARCHIVE_STORAGE_ROOT}/directus/uploads:/directus/uploads
    networks:
      - proxy-tier
      - data-tier
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/server/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  proxy-tier:
    external: true
  data-tier:
    external: true
