# Harbor 2.11 LTS — minimal viable stack.
#
# Assumes `install.sh` (from the Harbor offline installer) has been run once
# in this directory to render ./common/config/ from harbor.yml. See README.md.
#
# Differences vs. Harbor's installer-generated compose:
#   - Volumes bind-mount under ./data/ (not /data/harbor) — matches repo convention.
#   - `harbor-nginx` joins external `proxy-tier` so NPM can reach it by DNS name.
#   - Only `harbor-nginx` publishes a host port, and only on 127.0.0.1.
#     NPM terminates TLS and proxies to harbor-nginx:8080.

x-harbor-logging: &harbor-logging
  driver: "syslog"
  options:
    syslog-address: "tcp://127.0.0.1:1514"
    tag: "{{.Name}}"

services:
  log:
    image: goharbor/harbor-log:v2.11.1
    container_name: harbor-log
    restart: unless-stopped
    dns_search: .
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    volumes:
      - ./data/log:/var/log/docker/:z
      - ./common/config/log/:/etc/logrotate.d/:z
    ports:
      - "127.0.0.1:1514:10514"
    networks:
      - harbor

  registry:
    image: goharbor/registry-photon:v2.11.1
    container_name: registry
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/registry:/storage:z
      - ./common/config/registry/:/etc/registry/:z
      - ./data/secret/registry/root.crt:/etc/registry/root.crt:z
    networks:
      - harbor
    depends_on:
      - log
    logging: *harbor-logging

  registryctl:
    image: goharbor/harbor-registryctl:v2.11.1
    container_name: registryctl
    env_file:
      - ./common/config/registryctl/env
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/registry:/storage:z
      - ./common/config/registry/:/etc/registry/:z
      - ./common/config/registryctl/config.yml:/etc/registryctl/config.yml:z
    networks:
      - harbor
    depends_on:
      - log
    logging: *harbor-logging

  postgresql:
    image: goharbor/harbor-db:v2.11.1
    container_name: harbor-db
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ./data/database:/var/lib/postgresql/data:z
    networks:
      - harbor
    env_file:
      - ./common/config/db/env
    depends_on:
      - log
    logging: *harbor-logging

  redis:
    image: goharbor/redis-photon:v2.11.1
    container_name: redis
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/redis:/var/lib/redis
    networks:
      - harbor
    depends_on:
      - log
    logging: *harbor-logging

  core:
    image: goharbor/harbor-core:v2.11.1
    container_name: harbor-core
    env_file:
      - ./common/config/core/env
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - ./data/ca_download/:/etc/core/ca/:z
      - ./data/:/data/:z
      - ./common/config/core/certificates/:/etc/core/certificates/:z
      - ./common/config/core/app.conf:/etc/core/app.conf:z
      - ./data/secret/core/private_key.pem:/etc/core/private_key.pem:z
      - ./data/secret/keys/secretkey:/etc/core/key:z
      - ./data/psc/:/etc/core/token/:z
    networks:
      - harbor
    depends_on:
      - log
      - registry
      - redis
      - postgresql
    logging: *harbor-logging

  portal:
    image: goharbor/harbor-portal:v2.11.1
    container_name: harbor-portal
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    networks:
      - harbor
    depends_on:
      - log
    logging: *harbor-logging

  jobservice:
    image: goharbor/harbor-jobservice:v2.11.1
    container_name: harbor-jobservice
    env_file:
      - ./common/config/jobservice/env
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ./data/job_logs:/var/log/jobs:z
      - ./common/config/jobservice/config.yml:/etc/jobservice/config.yml:z
    networks:
      - harbor
    depends_on:
      - core
    logging: *harbor-logging

  trivy-adapter:
    image: goharbor/trivy-adapter-photon:v2.11.1
    container_name: trivy-adapter
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    env_file:
      - ./common/config/trivy-adapter/env
    volumes:
      - ./data/trivy-adapter/trivy:/home/scanner/.cache/trivy
      - ./data/trivy-adapter/reports:/home/scanner/.cache/reports
    networks:
      - harbor
    depends_on:
      - log
      - redis
    logging: *harbor-logging

  proxy:
    image: goharbor/nginx-photon:v2.11.1
    container_name: harbor-nginx
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./common/config/nginx:/etc/nginx:z
    networks:
      - harbor
      - proxy-tier
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      - registry
      - core
      - portal
      - log
    logging: *harbor-logging

networks:
  harbor:
    name: harbor
  proxy-tier:
    external: true
