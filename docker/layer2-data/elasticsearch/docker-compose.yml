services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: ${ES_JAVA_OPTS}
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ${PRIMARY_STORAGE_ROOT}/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - data-tier
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:\"$${ELASTIC_PASSWORD}\" http://127.0.0.1:9200/_cluster/health | grep -Eq '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  data-tier:
    external: true
