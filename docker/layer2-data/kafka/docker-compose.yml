services:
  kafka:
    image: bitnami/kafka:${KAFKA_VERSION}
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:${KAFKA_CONTROLLER_PORT}
      KAFKA_CFG_LISTENERS: PLAINTEXT://:${KAFKA_BROKER_PORT},CONTROLLER://:${KAFKA_CONTROLLER_PORT}
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_BROKER_PORT}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_LOG_DIRS: /bitnami/kafka/data
      KAFKA_HEAP_OPTS: -Xms512m -Xmx1g
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - /mnt/primary/kafka:/bitnami/kafka/data
    networks:
      - data-tier
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:${KAFKA_BROKER_PORT} >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  data-tier:
    external: true
