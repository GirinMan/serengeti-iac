name: Deploy Apps

# Deploys layer-3 apps to the homelab host.
# Runs on a self-hosted runner that lives on the same host as the
# compose stack, so deployment is a local `make <app>`—no SSH needed.
# Triggered by:
#   - repository_dispatch from the app source repos after a successful
#     image build+push to Harbor.
#   - workflow_dispatch (manual), choosing which app to deploy.

on:
  repository_dispatch:
    types: [deploy-blog, deploy-gis]
  workflow_dispatch:
    inputs:
      app:
        description: "App to deploy"
        required: true
        type: choice
        options:
          - blog
          - gis
          - apps
      tag:
        description: "Image tag (git sha) to pin before deploy. Leave empty to keep current .env value."
        required: false
        type: string

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, homelab]
    concurrency:
      group: deploy-${{ github.event.client_payload.app || github.event.inputs.app || github.event.action }}
      cancel-in-progress: false
    steps:
      - name: Resolve target app & tag
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              deploy-blog) APP=blog ;;
              deploy-gis)  APP=gis  ;;
              *) echo "unknown action ${{ github.event.action }}"; exit 1 ;;
            esac
            TAG="${{ github.event.client_payload.tag }}"
          else
            APP="${{ github.event.inputs.app }}"
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "app=$APP"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "Deploying app=$APP tag=$TAG"

      - name: Deploy on homelab host
        env:
          APP: ${{ steps.resolve.outputs.app }}
          TAG: ${{ steps.resolve.outputs.tag }}
          IAC_ROOT: /home/girinman/workspace/serengeti-iac
        run: |
          set -euo pipefail
          cd "$IAC_ROOT"

          git fetch --quiet origin main
          git reset --quiet --hard origin/main

          if [ -n "${TAG:-}" ]; then
            case "$APP" in
              blog)
                sed -i "s|^BLOG_IMAGE_TAG=.*|BLOG_IMAGE_TAG=${TAG}|" .env
                ;;
              gis)
                sed -i "s|^GIS_API_IMAGE_TAG=.*|GIS_API_IMAGE_TAG=${TAG}|" .env
                sed -i "s|^GIS_WEB_IMAGE_TAG=.*|GIS_WEB_IMAGE_TAG=${TAG}|" .env
                sed -i "s|^GIS_WORKER_IMAGE_TAG=.*|GIS_WORKER_IMAGE_TAG=${TAG}|" .env
                ;;
            esac
          fi

          case "$APP" in
            blog) make blog ;;
            gis)  make gis ;;
            apps) make apps ;;
            *) echo "unknown app: $APP"; exit 1 ;;
          esac
