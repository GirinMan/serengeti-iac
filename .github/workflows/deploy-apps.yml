name: Deploy Apps

# Deploys layer-3 apps to the homelab host by SSHing in and running `make <app>`.
# Triggered by:
#   - repository_dispatch from the app source repos (girinman-career, GIS-underground-facilities)
#     after they successfully build+push an image to Harbor.
#   - workflow_dispatch (manual), choosing which app to deploy.

on:
  repository_dispatch:
    types: [deploy-blog, deploy-gis]
  workflow_dispatch:
    inputs:
      app:
        description: "App to deploy"
        required: true
        type: choice
        options:
          - blog
          - gis
          - apps
      tag:
        description: "Image tag (git sha) to pin before deploy. Leave empty to keep current .env value."
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.event.client_payload.app || github.event.inputs.app || github.event.action }}
      cancel-in-progress: false
    steps:
      - name: Resolve target app & tag
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              deploy-blog) APP=blog ;;
              deploy-gis)  APP=gis  ;;
              *) echo "unknown action ${{ github.event.action }}"; exit 1 ;;
            esac
            TAG="${{ github.event.client_payload.tag }}"
          else
            APP="${{ github.event.inputs.app }}"
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "app=$APP"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "Deploying app=$APP tag=$TAG"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: APP,TAG
          script_stop: true
          script: |
            set -euo pipefail
            cd "$HOME/serengeti-iac"
            git fetch --quiet origin main
            git reset --quiet --hard origin/main

            # Pin the image tag in .env if a tag was provided.
            if [ -n "${TAG:-}" ]; then
              case "$APP" in
                blog)
                  sed -i "s|^BLOG_IMAGE_TAG=.*|BLOG_IMAGE_TAG=${TAG}|" .env
                  ;;
                gis)
                  sed -i "s|^GIS_API_IMAGE_TAG=.*|GIS_API_IMAGE_TAG=${TAG}|" .env
                  sed -i "s|^GIS_WEB_IMAGE_TAG=.*|GIS_WEB_IMAGE_TAG=${TAG}|" .env
                  sed -i "s|^GIS_WORKER_IMAGE_TAG=.*|GIS_WORKER_IMAGE_TAG=${TAG}|" .env
                  ;;
              esac
            fi

            case "$APP" in
              blog) make blog ;;
              gis)  make gis ;;
              apps) make apps ;;
              *) echo "unknown app: $APP"; exit 1 ;;
            esac
        env:
          APP: ${{ steps.resolve.outputs.app }}
          TAG: ${{ steps.resolve.outputs.tag }}
